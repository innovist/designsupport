# Advertising Design Domain Pack Manifest
#
# REQ-03-GEN-005: Domain-specific generation configuration

id: "advertising"
domain: "Advertising Design"

brief_schema:
  title:
    type: string
    required: true
    description: "Campaign title"
  description:
    type: string
    required: true
    description: "Campaign concept"
  product_service:
    type: string
    required: true
    description: "Product or service being advertised"
  target_audience:
    type: array
    items:
      type: string
    required: true
    description: "Target audience segments"
  key_message:
    type: string
    required: true
    description: "Primary campaign message"
  channels:
    type: array
    items:
      type: string
      enum: ["social", "print", "tv", "ooh", "digital"]
    required: true
    description: "Advertising channels"
  tone:
    type: string
    required: true
    enum: ["humorous", "emotional", "informative", "inspirational", "provocative"]
    description: "Campaign tone"

evaluation_axes:
  - "Message Clarity"
  - "Emotional Impact"
  - "Brand Recall"
  - "Call-to-Action Effectiveness"
  - "Visual Distinctiveness"
  - "Channel Suitability"

generation_outputs:
  - "campaign_concept_sketch"
  - "storyboard_frame"
  - "ad_layout_composition"
  - "copy_visual_integration"
  - "channel_variation"
  - "a_b_test_version"

spec_template_uri: "templates/advertising_spec.md"

spec_sections:
  - "campaign_strategy"
  - "creative_platform"
  - "message_hierarchy"
  - "visual_identity"
  - "channel_adaptations"
  - "media_plan_considerations"
  - "success_metrics"
