<!DOCTYPE html>
<html lang="ko">
<head data-i18n-title="{% block title_key %}{% endblock %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}패션 트렌드 AI 생성 시스템{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/design-system.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 헤더 -->
    <header class="header" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000;">
        <div style="max-width: 100%; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 2rem;">
                <h1 style="font-size: 20px; font-weight: 700; margin: 0; color: var(--color-primary);">
                    👗 <span data-i18n="nav.title">패션 트렌드 AI</span>
                </h1>
                <nav class="nav">
                    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}" data-i18n="nav.home">홈</a>
                    <a href="/projects" class="nav-link {% if '/projects' in request.path %}active{% endif %}" data-i18n="nav.projects">프로젝트</a>
                    <a href="/library" class="nav-link {% if '/library' in request.path %}active{% endif %}" data-i18n="nav.library">라이브러리</a>
                    <a href="/settings" class="nav-link {% if '/settings' in request.path %}active{% endif %}" data-i18n="nav.settings">설정</a>
                </nav>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 14px;">🌐</span>
                    <select id="language-select" class="language-selector" data-i18n-aria-label="common.language" style="padding: 4px 8px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-primary);">
                        <option value="ko" data-i18n="common.languages.ko">한국어</option>
                        <option value="en" data-i18n="common.languages.en">English</option>
                        <option value="zh-CN" data-i18n="common.languages.zhCn">中文(简体)</option>
                        <option value="zh-TW" data-i18n="common.languages.zhTw">中文(繁體)</option>
                    </select>
                </div>
                <span style="font-size: 12px; color: var(--text-muted);">
                    {% if now %}{{ now().strftime('%Y-%m-%d %H:%M') }}{% endif %}
                </span>
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="main-content" style="margin-top: 60px;">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- i18n Script -->
    <script src="/static/js/i18n.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
