{% extends "base.html" %}

{% block title_key %}pageTitles.ideas{% endblock %}
{% block title %}아이디어 관리 - 디자인 창작 지원 시스템{% endblock %}

{% block content %}
<header style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary);" data-i18n="ideas.title">아이디어 관리</h2>
            <p style="font-size: 1rem; color: var(--text-secondary);" data-i18n="ideas.subtitle">세션에서 생성된 디자인 아이디어를 확인합니다</p>
        </div>
        <a href="/history" class="btn btn-primary" data-i18n="ideas.actions.viewSessions">세션 보기</a>
    </div>
</header>

<section class="card" style="margin-bottom: 1.5rem;">
    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1rem;">
        <input type="text" id="search-ideas" placeholder="아이디어 검색..." data-i18n-placeholder="ideas.filters.searchPlaceholder">
        <select id="status-filter">
            <option value="" data-i18n="ideas.filters.statusAll">모든 상태</option>
            <option value="generated" data-i18n="ideas.status.generated">생성됨</option>
            <option value="selected" data-i18n="ideas.status.selected">선택됨</option>
        </select>
        <select id="sort-filter">
            <option value="recent" data-i18n="ideas.filters.sortRecent">최신순</option>
            <option value="title" data-i18n="ideas.filters.sortTitle">제목순</option>
        </select>
    </div>
</section>

<div id="ideas-container" style="display: grid; gap: 1rem;">
    <div class="card" style="text-align: center; padding: 3rem;">
        <p style="color: var(--text-muted);" data-i18n="ideas.loading">아이디어 로딩 중...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function tr(key, params) {
    return window.t ? window.t(key, params) : key;
}
let ideas = [];

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

function renderIdeas(list) {
    const container = document.getElementById('ideas-container');
    if (!list || list.length === 0) {
        container.innerHTML = `
            <div class="card" style="text-align: center; padding: 3rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">💡</div>
                <h4 style="font-size: var(--font-lg); font-weight: 600; margin-bottom: 0.5rem;">${tr('ideas.empty.title')}</h4>
                <p style="color: var(--text-secondary); margin-bottom: 1rem;">${tr('ideas.empty.subtitle')}</p>
                <a href="/projects" class="btn btn-primary">${tr('ideas.empty.action')}</a>
            </div>
        `;
        return;
    }

    container.innerHTML = list.map(idea => `
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem;">
                <div>
                    <h4 style="font-size: var(--font-lg); font-weight: 600; margin: 0; color: var(--text-primary);">${escapeHtml(idea.title || idea.concept_name || tr('ideas.labels.defaultTitle'))}</h4>
                    <p style="font-size: var(--font-sm); color: var(--text-secondary); margin-top: 0.25rem;">${escapeHtml(idea.summary || idea.description || '')}</p>
                </div>
                <span class="badge">${getIdeaStatus(idea.status)}</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: var(--font-xs); color: var(--text-muted);">${tr('ideas.labels.sessionPrefix', { id: idea.session_id })}</span>
                <a href="/sessions/${idea.session_id}" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: var(--font-sm);">${tr('ideas.actions.openSession')}</a>
            </div>
        </div>
    `).join('');
}

function getIdeaStatus(status) {
    if (status === 'selected') {
        return tr('ideas.status.selected');
    }
    return tr('ideas.status.generated');
}

function applyFilters() {
    const query = document.getElementById('search-ideas').value.trim().toLowerCase();
    const status = document.getElementById('status-filter').value;
    const sort = document.getElementById('sort-filter').value;

    let filtered = ideas.filter(idea => {
        const text = `${idea.title || ''} ${idea.summary || ''} ${idea.concept_name || ''}`.toLowerCase();
        const matchQuery = !query || text.includes(query);
        const matchStatus = !status || (idea.status || 'generated') === status;
        return matchQuery && matchStatus;
    });

    if (sort === 'title') {
        filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
    } else {
        filtered.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
    }

    renderIdeas(filtered);
}

async function loadIdeas() {
    try {
        const res = await fetch('/api/v1/ideas/');
        if (res.ok) {
            ideas = await res.json();
            applyFilters();
        }
    } catch (error) {
        console.error('아이디어 로드 실패:', error);
        renderIdeas([]);
    }
}

['search-ideas', 'status-filter', 'sort-filter'].forEach(id => {
    document.addEventListener('input', (e) => {
        if (e.target && e.target.id === id) {
            applyFilters();
        }
    });
});

document.addEventListener('DOMContentLoaded', loadIdeas);
window.addEventListener('languageChanged', () => renderIdeas(ideas || []));
</script>
{% endblock %}
