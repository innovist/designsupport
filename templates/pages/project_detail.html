{% extends "base.html" %}

{% block title_key %}pageTitles.projectDetail{% endblock %}
{% block title %}프로젝트 상세 - 디자인 발상 시스템{% endblock %}

{% block extra_css %}
<style>
/* ── Shell ── */
.project-detail-shell {
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    gap: 0;
    align-items: stretch;
    min-height: calc(100vh - 108px);
    margin: -24px -24px 0;
}
.project-detail-shell.sidebar-collapsed {
    grid-template-columns: 40px minmax(0, 1fr);
}

/* ── Sidebar ── */
.project-sidebar {
    border-right: 1px solid var(--border-color);
    position: sticky;
    top: 60px;
    align-self: start;
    height: calc(100vh - 60px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
.project-sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
    gap: 6px;
}
.sidebar-back-link {
    display: flex;
    align-items: center;
    gap: 3px;
    color: var(--text-secondary);
    font-size: var(--font-xs);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    min-width: 0;
}
.sidebar-back-link:hover { color: var(--text-primary); }
.sidebar-toggle-btn {
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
    color: var(--text-secondary);
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.sidebar-toggle-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.sidebar-section-label {
    font-size: var(--font-sm);
    font-weight: 700;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 10px 14px 4px;
    flex-shrink: 0;
}
.sidebar-list-wrap {
    overflow-y: auto;
    flex: 1;
    padding: 4px 8px 16px;
}

/* Collapsed: hide everything except toggle */
.project-detail-shell.sidebar-collapsed .sidebar-collapsible {
    display: none;
}
.project-detail-shell.sidebar-collapsed .project-sidebar-head {
    justify-content: center;
    padding: 10px 8px 8px;
}

/* ── Sidebar items ── */
.sidebar-project-item {
    display: block;
    padding: 6px 8px;
    border-radius: 3px;
    text-decoration: none;
    color: var(--text-primary);
    margin-bottom: 1px;
    border-left: 2px solid transparent;
}
.sidebar-project-item:hover { background: var(--bg-hover); }
.sidebar-project-item.active {
    border-left-color: var(--color-primary);
    background: var(--bg-hover);
}
.sidebar-project-name {
    font-size: var(--font-sm);
    font-weight: 600;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.sidebar-project-brief {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* ── Main content ── */
.project-main { padding: 16px 20px; min-width: 0; }

/* ── Detail header ── */
.detail-header {
    padding-bottom: 10px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border-color);
}
.detail-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 3px;
}
.detail-title {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0;
    color: var(--text-primary);
    min-width: 0;
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.detail-meta {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    flex-wrap: wrap;
}
.header-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
    flex-shrink: 0;
}

/* ── Description display ── */
.desc-view {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 9px;
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    width: 100%;
}
.desc-text {
    flex: 1;
    min-width: 0;
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.5;
    white-space: pre-wrap;
    margin: 0;
}
.desc-edit-btn {
    background: none;
    border: 1px solid var(--border-color);
    padding: 2px 8px;
    cursor: pointer;
    color: var(--text-muted);
    border-radius: 3px;
    font-size: var(--font-xs);
    white-space: nowrap;
    flex-shrink: 0;
    line-height: 1.8;
}
.desc-edit-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ── Description edit ── */
.desc-edit { display: none; }
.desc-edit textarea {
    width: 100%;
    min-height: 100px;
    margin-bottom: 8px;
    resize: vertical;
    box-sizing: border-box;
}
.desc-edit-actions { display: flex; gap: 6px; }

/* ── Draft section ── */
.section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 6px;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border-color);
}
.section-title { font-size: var(--font-base); font-weight: 700; margin: 0; color: var(--text-primary); }

/* Draft grid — wider cards */
.draft-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }

/* Draft card */
.draft-card {
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--bg-card);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
.draft-thumb {
    width: 100%;
    height: 120px;
    background: var(--bg-hover);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}
.draft-thumb img { width: 100%; height: 100%; object-fit: cover; }
.draft-thumb-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #aab;
}
.draft-thumb-icon { font-size: 1.75rem; }
.draft-thumb-label { font-size: 10px; letter-spacing: 0.04em; }
.draft-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

/* Status row */
.draft-status-row { display: flex; justify-content: space-between; align-items: center; }
.draft-title { font-size: var(--font-base); font-weight: 700; color: var(--text-primary); }

/* Stage badge colors */
.stage-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
}
.stage-badge.stage-active   { background: #dbeafe; color: #1d4ed8; }
.stage-badge.stage-done     { background: #dcfce7; color: #15803d; }
.stage-badge.stage-error    { background: #fee2e2; color: #b91c1c; }
.stage-badge.stage-pending  { background: #f3f4f6; color: #6b7280; }

/* Progress dots */
.draft-progress {
    display: flex;
    align-items: center;
    gap: 0;
}
.prog-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d1d5db;
    flex-shrink: 0;
}
.prog-dot.done  { background: #22c55e; }
.prog-dot.active { background: var(--color-primary); }
.prog-dot.error  { background: var(--color-danger); }
.prog-line {
    flex: 1;
    height: 2px;
    background: #d1d5db;
}
.prog-line.done { background: #22c55e; }

/* Stage name */
.draft-stage-name { font-size: 11px; color: var(--text-muted); margin-top: -4px; }

/* Footer */
.draft-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 4px;
    border-top: 1px solid var(--border-color);
    margin-top: auto;
}
.draft-date { font-size: 11px; color: var(--text-muted); }
.draft-actions { display: flex; gap: 4px; }

/* ── Responsive ── */
@media (max-width: 960px) {
    .project-detail-shell,
    .project-detail-shell.sidebar-collapsed { grid-template-columns: 1fr; }
    .project-sidebar { position: static; height: auto; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border-color); }
    .project-detail-shell.sidebar-collapsed .project-sidebar { display: none; }
    .project-detail-shell.sidebar-collapsed .sidebar-collapsible { display: block; }
    .project-main { padding: 16px 0; }
}
</style>
{% endblock %}

{% block content %}
<div id="project-detail-app" class="project-detail-shell">

    <!-- ── Left Sidebar ── -->
    <aside class="project-sidebar">
        <div class="project-sidebar-head">
            <a href="/projects" class="sidebar-back-link sidebar-collapsible" data-i18n="projectDetail.backToList">← 목록</a>
            <button onclick="toggleProjectSidebar()" class="sidebar-toggle-btn" id="sidebar-toggle-btn"
                    title="사이드바 접기/펼치기" aria-label="사이드바 토글">
                <svg id="sidebar-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
        </div>
        <div class="sidebar-section-label sidebar-collapsible" data-i18n="nav.projects">프로젝트</div>
        <div class="sidebar-list-wrap sidebar-collapsible" id="project-sidebar-list">
            <div class="skeleton" style="height:36px;border-radius:4px;margin-bottom:4px;"></div>
            <div class="skeleton" style="height:36px;border-radius:4px;"></div>
        </div>
    </aside>

    <!-- ── Main Content ── -->
    <div class="project-main">
        <header class="detail-header">
            <div class="detail-header-row">
                <h2 id="project-title" class="detail-title" data-i18n="common.loading">프로젝트 로딩 중…</h2>
                <div class="header-actions">
                    <button onclick="openLatestDraft()" class="btn btn-primary btn-sm" style="font-size: var(--font-xs);">최근 디자인안 열기</button>
                    <button onclick="createNewDraft()" class="btn btn-secondary btn-sm" style="font-size: var(--font-xs);">새 디자인안</button>
                </div>
            </div>

            <div class="detail-meta">
                <span><span data-i18n="common.createdAt">생성일</span> <strong id="project-created"></strong></span>
                <span>·</span>
                <span><span data-i18n="common.status">상태</span> <strong id="project-status"></strong></span>
            </div>

            <!-- Description: display mode -->
            <div id="description-display" class="desc-view">
                <p id="project-description" class="desc-text"></p>
                <button onclick="toggleEditDescription()" class="desc-edit-btn" data-i18n="common.edit">수정</button>
            </div>

            <!-- Description: edit mode -->
            <div id="description-edit" class="desc-edit">
                <textarea id="description-input"
                          placeholder="이 프로젝트의 요구 조건, 목표, 제약, 원하는 결과를 한 번에 입력하세요."
                          autocomplete="off" spellcheck="false"></textarea>
                <div class="desc-edit-actions">
                    <button onclick="saveDescription()" class="btn btn-sm btn-primary"
                            style="font-size: var(--font-xs);" data-i18n="common.save">저장</button>
                    <button onclick="cancelEditDescription()" class="btn btn-sm btn-outline"
                            style="font-size: var(--font-xs);" data-i18n="common.cancel">취소</button>
                </div>
            </div>
        </header>

        <section>
            <div class="section-head">
                <h3 class="section-title">디자인안</h3>
                <span style="font-size: var(--font-xs); color: var(--text-muted);" id="draft-count"></span>
            </div>
            <div id="sessions-container" class="draft-grid">
                <div style="grid-column: 1 / -1; padding: 1rem; color: var(--text-muted); font-size: var(--font-sm);">
                    디자인안 로딩 중…
                </div>
            </div>
        </section>
    </div>
</div>

<script>
function tr(key, params) {
    return window.t ? window.t(key, params) : key;
}

const projectId = "{{ project_id }}";
let project = null;
let projectList = [];
let sessions = [];

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

function getStatusText(status) {
    const map = {
        created: tr('status.created'),
        running: tr('status.running'),
        analyzing: tr('status.analyzing'),
        completed: tr('status.completed'),
        failed: tr('status.failed'),
        draft: tr('status.draft'),
        active: tr('status.active')
    };
    return map[status] || tr('status.unknown');
}

function formatDateShort(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr).toLocaleDateString(window.i18n.getNumberLocale());
}

function renderProjectSidebar() {
    const container = document.getElementById('project-sidebar-list');
    if (!container) return;
    if (!projectList.length) {
        container.innerHTML = '<div style="font-size:var(--font-sm);color:var(--text-muted);padding:8px 8px;">프로젝트가 없습니다.</div>';
        return;
    }
    container.innerHTML = projectList.map(item => {
        const active = item.id === projectId;
        const name = item.name || item.title || '이름 없음';
        const brief = item.purpose || item.description || '브리프 없음';
        return `
            <a class="sidebar-project-item ${active ? 'active' : ''}" href="/projects/${item.id}">
                <div class="sidebar-project-name">${escapeHtml(name)}</div>
                <div class="sidebar-project-brief">${escapeHtml(brief)}</div>
            </a>
        `;
    }).join('');
}

async function loadProjectSidebar() {
    try {
        const res = await fetch('/api/projects');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        projectList = await res.json();
        renderProjectSidebar();
    } catch (error) {
        console.error('Project sidebar load error:', error);
        const container = document.getElementById('project-sidebar-list');
        if (container) {
            container.innerHTML = '<div style="font-size:var(--font-sm);color:var(--color-danger);padding:8px;">프로젝트 목록을 불러오지 못했습니다.</div>';
        }
    }
}

function toggleProjectSidebar() {
    const shell = document.getElementById('project-detail-app');
    shell.classList.toggle('sidebar-collapsed');
    const collapsed = shell.classList.contains('sidebar-collapsed');
    const icon = document.getElementById('sidebar-toggle-icon');
    if (icon) {
        icon.innerHTML = collapsed
            ? '<polyline points="9 18 15 12 9 6"/>'
            : '<polyline points="15 18 9 12 15 6"/>';
    }
}

function renderProjectDetail() {
    if (!project) return;
    document.getElementById('project-title').textContent = project.name || project.title || '';
    document.getElementById('project-description').textContent = project.purpose || project.description || tr('common.noDescription');
    document.getElementById('project-created').textContent = formatDateShort(project.created_at);
    document.getElementById('project-status').textContent = getStatusText(project.status);
}

async function loadProjectDetail() {
    const res = await fetch(`/api/projects/${projectId}`);
    if (!res.ok) {
        alert(tr('projectDetail.messages.notFound'));
        window.location.href = '/projects';
        return;
    }
    project = await res.json();
    renderProjectDetail();
}

async function loadSessions() {
    const res = await fetch(`/api/sessions?project_id=${projectId}&limit=100`);
    if (res.ok) {
        sessions = await res.json();
        renderSessions();
    }
}

/* Pipeline stage config */
const PIPELINE_STEPS = [
    { key: 'brief_input',  label: '브리프' },
    { key: 'trend',        label: '분석' },
    { key: 'concepting',   label: '컨셉' },
	    { key: 'generating',   label: '스케치/이미지' },
    { key: 'completed',    label: '완료' },
];
const STAGE_TO_STEP = {
    brief_input: 0, trend: 1, concepting: 2, referencing: 2,
    abstracting: 2, generating: 3, documenting: 4, review_ready: 4, completed: 5,
};
const STAGE_LABELS_KO = {
    brief_input: '브리프 입력', trend: '트렌드 분석', concepting: '컨셉 생성',
	    referencing: '레퍼런스 수집', abstracting: '추상화', generating: '스케치/최종 이미지 생성',
    documenting: '문서 작성', review_ready: '검토 준비', completed: '완료', failed: '실패',
};

function buildProgressDots(stage, status) {
    if (status === 'failed') {
        return `<div class="draft-stage-name" style="color:var(--color-danger);">✕ 처리 실패</div>`;
    }
    const currentStep = STAGE_TO_STEP[stage] ?? 0;
    const isFull = (stage === 'completed');
    let dots = '';
    PIPELINE_STEPS.forEach((step, i) => {
        const done = isFull ? true : i < currentStep;
        const active = !isFull && i === currentStep;
        const cls = done ? 'done' : active ? 'active' : '';
        if (i > 0) dots += `<div class="prog-line${done ? ' done' : ''}"></div>`;
        dots += `<div class="prog-dot${cls ? ' ' + cls : ''}"></div>`;
    });
    const stageName = STAGE_LABELS_KO[stage] || stage;
    return `
        <div class="draft-progress">${dots}</div>
        <div class="draft-stage-name">${escapeHtml(stageName)}</div>
    `;
}

function getStageBadgeClass(stage, status) {
    if (status === 'failed' || stage === 'failed') return 'stage-error';
    if (stage === 'completed') return 'stage-done';
    if (stage === 'brief_input') return 'stage-pending';
    return 'stage-active';
}

function getStageBadgeLabel(stage, status) {
    if (status === 'failed' || stage === 'failed') return '실패';
    if (stage === 'completed') return '완료';
    if (stage === 'brief_input') return '대기';
    return '진행 중';
}

function renderSessions() {
    const container = document.getElementById('sessions-container');
    const countEl = document.getElementById('draft-count');
    if (countEl) countEl.textContent = sessions && sessions.length ? `${sessions.length}개` : '';
    if (!sessions || sessions.length === 0) {
        container.innerHTML = `
            <div style="grid-column: 1 / -1; padding: 2rem 0; text-align: center;">
                <p style="color: var(--text-secondary); margin: 0 0 0.75rem;">${tr('projectDetail.empty.subtitle')}</p>
                <button onclick="createNewDraft()" class="btn btn-primary btn-sm">첫 디자인안 만들기</button>
            </div>
        `;
        return;
    }
    container.innerHTML = sessions.map((session, index) => {
        const draftNumber = sessions.length - index;
        const stage = session.pipeline_stage || 'brief_input';
        const status = session.status || 'active';
        const badgeCls = getStageBadgeClass(stage, status);
        const badgeLabel = getStageBadgeLabel(stage, status);
        return `
        <div class="draft-card">
            <div class="draft-thumb" id="thumb-${escapeHtml(session.id)}">
                <div class="draft-thumb-placeholder">
                    <span class="draft-thumb-icon">🎨</span>
	                    <span class="draft-thumb-label">산출물 없음</span>
                </div>
            </div>
            <div class="draft-body">
                <div class="draft-status-row">
                    <span class="draft-title">디자인안 ${draftNumber}</span>
                    <span class="stage-badge ${badgeCls}">${badgeLabel}</span>
                </div>
                ${buildProgressDots(stage, status)}
                <div class="draft-foot">
                    <span class="draft-date">${formatDateShort(session.created_at)}</span>
                    <div class="draft-actions">
                        <a href="/sessions/${session.id}" class="btn btn-primary btn-sm" style="font-size:var(--font-xs);padding:3px 10px;">${tr('common.open')}</a>
                        <button onclick="deleteSession('${session.id}')" class="btn btn-outline btn-sm" style="font-size:var(--font-xs);padding:3px 10px;">${tr('common.delete')}</button>
                    </div>
                </div>
            </div>
        </div>
        `;
    }).join('');
    loadDraftThumbnails();
}

async function loadDraftThumbnails() {
    sessions.forEach(async (session) => {
        try {
            const res = await fetch(`/api/sessions/${session.id}/generations`);
            if (!res.ok) return;
            const gens = await res.json();
            const latest = gens.find(g => g.status === 'completed' && g.image_url);
            if (!latest?.image_url) return;
            const thumbEl = document.getElementById(`thumb-${session.id}`);
            if (thumbEl) {
                const img = document.createElement('img');
                img.src = latest.image_url;
                img.alt = '디자인 썸네일';
                img.onerror = () => {};
                thumbEl.innerHTML = '';
                thumbEl.appendChild(img);
            }
        } catch { /* thumbnail load is optional */ }
    });
}

function toggleEditDescription() {
    document.getElementById('description-display').style.display = 'none';
    document.getElementById('description-edit').style.display = 'block';
    document.getElementById('description-input').value = project?.purpose || project?.description || '';
    document.getElementById('description-input').focus();
}

function cancelEditDescription() {
    document.getElementById('description-display').style.display = '';
    document.getElementById('description-edit').style.display = 'none';
}

async function saveDescription() {
    const description = document.getElementById('description-input').value.trim();
    const res = await fetch(`/api/projects/${projectId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ purpose: description })
    });
    if (res.ok) {
        project.purpose = description;
        document.getElementById('project-description').textContent = description || tr('common.noDescription');
        cancelEditDescription();
    } else {
        alert(tr('projectDetail.messages.descriptionSaveFailed'));
    }
}

async function deleteSession(sessionId) {
    if (!confirm(tr('projectDetail.messages.confirmDeleteSession'))) return;
    const res = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
    if (res.ok) {
        await loadSessions();
    } else {
        alert(tr('projectDetail.messages.deleteFailed'));
    }
}

async function openLatestDraft() {
    if (sessions && sessions.length > 0) {
        window.location.href = `/sessions/${sessions[0].id}`;
        return;
    }
    await createNewDraft();
}

async function createNewDraft() {
    if (!project || !(project.purpose || '').trim()) {
        alert('프로젝트 브리프를 먼저 입력하세요.');
        toggleEditDescription();
        return;
    }
    const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ project_id: projectId, mode: 'auto' })
    });
    if (!res.ok) {
        alert('디자인안을 생성하지 못했습니다.');
        return;
    }
    const session = await res.json();
    await copyProjectBriefToDraft(session.id);
    window.location.href = `/sessions/${session.id}`;
}

async function copyProjectBriefToDraft(sessionId) {
    const res = await fetch(`/api/sessions/${sessionId}/brief`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            purpose: project.purpose || '',
            domain: project.domain || null,
            result_form: 'design image'
        })
    });
    if (!res.ok) {
        throw new Error('프로젝트 브리프를 디자인안에 연결하지 못했습니다.');
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    await loadProjectSidebar();
    await loadProjectDetail();
    await loadSessions();
});
window.addEventListener('languageChanged', () => {
    renderProjectDetail();
    renderSessions();
});
</script>
