<!-- 세션 생성 모달 -->
<div id="session-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="panel-section" style="width: 800px; max-width: 95vw; max-height: 90vh; overflow-y: auto;">
        <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;" data-i18n="dashboard.modals.session.title">새 세션 생성</h3>
        <form id="session-form">
            <!-- 기본 정보 -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                <div>
                    <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="dashboard.modals.session.name">세션 이름</label>
                    <input type="text" id="session-title-input" class="form-input" placeholder="예: 캐주얼 여성복 분석" data-i18n-placeholder="dashboard.modals.session.namePlaceholder" required style="width: 100%;">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="dashboard.modals.session.description">설명</label>
                    <input type="text" id="session-desc-input" class="form-input" placeholder="분석 목적..." data-i18n-placeholder="dashboard.modals.session.descriptionPlaceholder" style="width: 100%;">
                </div>
            </div>

            <!-- 필터 설정 (다중 선택) -->
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                <div>
                    <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="filters.gender.label">성별</label>
                    <div class="checkbox-group-compact">
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-gender" value="female"> <span data-i18n="filters.gender.options.female">여성</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-gender" value="male"> <span data-i18n="filters.gender.options.male">남성</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-gender" value="unisex"> <span data-i18n="filters.gender.options.unisex">유니섹스</span></label>
                    </div>
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="filters.season.label">계절</label>
                    <div class="checkbox-group-compact">
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-season" value="spring"> <span data-i18n="filters.season.options.spring">봄</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-season" value="summer"> <span data-i18n="filters.season.options.summer">여름</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-season" value="fall"> <span data-i18n="filters.season.options.fall">가을</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-season" value="winter"> <span data-i18n="filters.season.options.winter">겨울</span></label>
                    </div>
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="filters.category.label">카테고리</label>
                    <div class="checkbox-group-compact">
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-category" value="casual"> <span data-i18n="filters.category.options.casual">캐주얼</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-category" value="formal"> <span data-i18n="filters.category.options.formal">포멀</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-category" value="sports"> <span data-i18n="filters.category.options.sports">스포츠</span></label>
                        <label class="checkbox-item-compact"><input type="checkbox" name="filter-category" value="outdoor"> <span data-i18n="filters.category.options.outdoor">아웃도어</span></label>
                    </div>
                </div>
            </div>

            <!-- 크롤러 설정 영역 -->
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 12px;">
                <!-- 왼쪽: 크롤러 선택 -->
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="font-size: 12px; font-weight: 500;" data-i18n="dashboard.modals.session.crawlerSelect">크롤러 선택</label>
                        <div style="display: flex; gap: 4px;">
                            <button type="button" onclick="selectAllCrawlers()" style="padding: 2px 6px; font-size: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; cursor: pointer;" data-i18n="newSession.crawlers.selectAll">전체선택</button>
                            <button type="button" onclick="deselectAllCrawlers()" style="padding: 2px 6px; font-size: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; cursor: pointer;" data-i18n="newSession.crawlers.deselectAll">전체해제</button>
                        </div>
                    </div>
                    <div id="crawler-checkboxes" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 120px; overflow-y: auto; padding: 8px; background: var(--bg-secondary); border-radius: 6px;">
                        <span style="color: var(--text-muted); font-size: 11px;" data-i18n="common.loading">로딩 중...</span>
                    </div>
                </div>

                <!-- 오른쪽: 수집 기간 및 설정 -->
                <div style="background: var(--bg-secondary); padding: 12px; border-radius: 6px;">
                    <label style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px;" data-i18n="dashboard.crawlerConfig.title">수집 설정</label>
                    <div style="display: grid; gap: 8px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            <div>
                                <label style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;" data-i18n="dashboard.crawlerConfig.startDate">시작일</label>
                                <input type="date" id="crawl-start-date" class="form-input" style="width: 100%; padding: 6px; font-size: 11px;">
                            </div>
                            <div>
                                <label style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;" data-i18n="dashboard.crawlerConfig.endDate">종료일</label>
                                <input type="date" id="crawl-end-date" class="form-input" style="width: 100%; padding: 6px; font-size: 11px;">
                            </div>
                        </div>
                        <div>
                            <label style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;" data-i18n="dashboard.crawlerConfig.maxPosts">크롤러당 최대 게시물 수</label>
                            <input type="number" id="max-posts-per-crawler" class="form-input" value="50" min="10" max="500" style="width: 100%; padding: 6px; font-size: 11px;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 유튜브 채널 선택 + 유튜브 설정 -->
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px;">
                <!-- 왼쪽: 유튜브 채널 -->
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label style="font-size: 12px; font-weight: 500;" data-i18n="youtube.channelsTitle">유튜브 채널</label>
                        <span style="font-size: 10px; color: var(--text-muted);" data-i18n="youtube.manageHint">채널 관리는 설정 페이지에서</span>
                    </div>
                    <p style="font-size: 10px; color: var(--text-muted); margin-bottom: 6px;" data-i18n="youtube.selectionHint">체크된 채널만 크롤링됩니다. 유튜브 크롤러가 선택되어야 활성화됩니다.</p>
                    <div id="youtube-channels-list" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; max-height: 80px; overflow-y: auto; padding: 8px; background: var(--bg-secondary); border-radius: 6px; min-height: 40px;">
                        <span style="color: var(--text-muted); font-size: 11px; grid-column: 1 / -1; text-align: center;" data-i18n="common.loading">로딩 중...</span>
                    </div>
                </div>

                <!-- 오른쪽: 유튜브 설정 -->
                <div style="background: var(--bg-secondary); padding: 12px; border-radius: 6px;">
                    <label style="font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px;" data-i18n="youtube.settingsTitle">유튜브 설정</label>
                    <div style="display: grid; gap: 8px;">
                        <div>
                            <label style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;" data-i18n="youtube.keywordCount">키워드 검색 영상 수</label>
                            <input type="number" id="youtube-keyword-count" class="form-input" value="10" min="2" max="50" style="width: 100%; padding: 6px; font-size: 11px;">
                        </div>
                        <div>
                            <label style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;" data-i18n="youtube.channelMax">채널당 최대 영상 수</label>
                            <input type="number" id="youtube-channel-max" class="form-input" value="20" min="2" max="100" style="width: 100%; padding: 6px; font-size: 11px;">
                        </div>
                        <div>
                            <label style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;" data-i18n="youtube.parallel">병렬 실행 수 (1~5)</label>
                            <input type="number" id="youtube-parallel" class="form-input" value="1" min="1" max="5" style="width: 100%; padding: 6px; font-size: 11px;">
                            <p style="font-size: 9px; color: var(--warning); margin-top: 2px;" data-i18n="youtube.parallelWarning">⚠️ 2 이상 시 오류 가능</p>
                        </div>
                        <div>
                            <label style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px;" data-i18n="youtube.enableStt">STT 음성 전사 사용</label>
                            <p style="font-size: 11px; color: var(--text-secondary); margin: 0;" data-i18n="youtube.enableSttHint">음성 텍스트 전사를 수행합니다 (처리 시간 증가)</p>
                        </div>
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeSessionModal()" data-i18n="common.cancel">취소</button>
                <button type="submit" class="btn btn-primary" data-i18n="common.create">생성</button>
            </div>
        </form>
    </div>
</div>
