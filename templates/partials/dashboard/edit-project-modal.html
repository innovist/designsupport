<!-- 프로젝트 수정 모달 -->
<div id="edit-project-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div class="panel-section" style="width: 400px; max-width: 90vw;">
        <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 16px;" data-i18n="dashboard.modals.editProject.title">프로젝트 수정</h3>
        <form id="edit-project-form">
            <input type="hidden" id="edit-project-id">
            <div style="margin-bottom: 12px;">
                <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="dashboard.modals.project.name">프로젝트 이름</label>
                <input type="text" id="edit-project-title" class="form-input" required style="width: 100%;">
            </div>
            <div style="margin-bottom: 12px;">
                <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="dashboard.modals.project.imageModelLabel">이미지 모델</label>
                <select id="edit-project-image-model" class="form-input" style="width: 100%;">
                    <option value="" data-i18n="dashboard.modals.project.imageModelAuto">자동 선택</option>
                    <option value="seedream" data-i18n="dashboard.modals.project.imageModelSeedream">Seedream (클라우드)</option>
                    <option value="nano_banana" data-i18n="dashboard.modals.project.imageModelNano">Nano Banana (클라우드)</option>
                    <option value="zimage" data-i18n="dashboard.modals.project.imageModelZImage">Z-Image (GPU)</option>
                </select>
                <p id="edit-project-image-model-status" style="font-size: 10px; color: var(--text-muted); margin-top: 4px;" data-i18n="dashboard.modals.project.gpuDetecting">GPU 확인 중...</p>
            </div>
            <div style="margin-bottom: 16px;">
                <label style="font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px;" data-i18n="dashboard.modals.project.description">설명</label>
                <textarea id="edit-project-desc" class="form-input" rows="3" style="width: 100%;"></textarea>
            </div>
            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeEditProjectModal()" data-i18n="common.cancel">취소</button>
                <button type="submit" class="btn btn-primary" data-i18n="common.save">저장</button>
            </div>
        </form>
    </div>
</div>
